{% extends 'base.html' %}

{% block title %}Student Login - EduPlay{% endblock %}

{% block content %}
<div class="glass-panel form-container slide-up" id="student-login-panel">
    <h2 class="form-title" style="color: var(--accent-purple);">Student Sign In</h2>
    
    <form method="POST" id="student-login-form">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <span style="font-size: 0.85rem; color: var(--accent-red); margin-top: 0.25rem;">⚠️ {{ field.errors.0 }}</span>
                {% endif %}
            </div>
        {% endfor %}
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;" id="submit-student-login">
            Login
        </button>
    </form>
    
</div>
{% endblock %}
