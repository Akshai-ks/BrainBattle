{% extends 'base.html' %}

{% block title %}Welcome to Smart Learning Platform - EduPlay{% endblock %}

{% block content %}
<div class="smart-portal-wrapper fade-in">
    
    <!-- Top Right Login Actions -->
    <div class="top-right-actions">
        <a href="{% url 'student_login' %}" class="portal-pill-btn student-pill">
            <span class="dot student-dot"></span> Student Login
        </a>
        <a href="{% url 'teacher_login' %}" class="portal-pill-btn teacher-pill">
            <span class="dot teacher-dot"></span> Teacher Login
        </a>
    </div>

    <!-- Main Centered Content Container -->
    <div class="portal-main-card">
        
        <!-- Elegant Education/Gaming Vector Illustration -->
        <div class="illustration-wrapper">
            <svg class="floating-icon" xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 24 24" fill="none" stroke="url(#accent-grad)" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--accent-cyan)" />
                        <stop offset="50%" stop-color="var(--accent-purple)" />
                        <stop offset="100%" stop-color="var(--accent-green)" />
                    </linearGradient>
                </defs>
                <circle cx="12" cy="12" r="10" stroke-dasharray="4 4" stroke="rgba(255, 255, 255, 0.1)"/>
                <path d="M22 10v6M2 10l10-5 10 5-10 5-10-5z" />
                <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5" />
                <circle cx="12" cy="10" r="1.5" fill="url(#accent-grad)" />
                <line x1="9.5" y1="10" x2="14.5" y2="10" stroke="url(#accent-grad)" stroke-width="1" />
            </svg>
        </div>

        <!-- Heading & Subtitle -->
        <h1 class="main-title">Welcome to Smart Learning Platform</h1>
        <p class="main-subtitle">Learn, Compete, and Track Your Progress</p>
    </div>
</div>

<!-- Custom Page Styling -->
<style>
    /* Hide standard navbar on index to display custom login layout */
    #main-navbar {
        display: none !important;
    }

    /* Main Container */
    .smart-portal-wrapper {
        position: relative;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6rem 2rem 2rem 2rem;
    }

    /* Top Right Login Actions */
    .top-right-actions {
        position: absolute;
        top: 2.5rem;
        right: 2.5rem;
        display: flex;
        gap: 1rem;
        z-index: 100;
    }

    .portal-pill-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 1.25rem;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 100px;
        color: var(--text-secondary);
        font-size: 0.85rem;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .portal-pill-btn:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.2);
        color: #fff;
    }

    /* Status Indicator Dots */
    .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }
    
    .student-dot {
        background: var(--accent-green);
        box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
    }
    
    .teacher-dot {
        background: var(--accent-blue);
        box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
    }

    /* Centered Content Card */
    .portal-main-card {
        max-width: 600px;
        width: 100%;
        padding: 3.5rem 2rem;
        text-align: center;
        background: rgba(30, 41, 59, 0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-card);
    }

    /* Floating Illustration wrapper */
    .illustration-wrapper {
        margin-bottom: 2rem;
        display: flex;
        justify-content: center;
    }

    .floating-icon {
        animation: float 6s infinite ease-in-out;
    }

    /* Headings */
    .main-title {
        font-size: 2.75rem;
        font-weight: 800;
        color: #fff;
        margin: 0 0 1rem 0;
        letter-spacing: -0.03em;
        line-height: 1.2;
    }

    .main-subtitle {
        font-size: 1.15rem;
        color: var(--text-secondary);
        margin: 0;
        font-weight: 400;
        line-height: 1.5;
    }

    /* Floating Animation keyframes */
    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    /* Responsive Adjustments */
    @media (max-width: 640px) {
        .smart-portal-wrapper {
            padding: 8rem 1.5rem 2rem 1.5rem;
            align-items: flex-start;
        }
        .top-right-actions {
            top: 2rem;
            left: 50%;
            right: auto;
            transform: translateX(-50%);
            width: calc(100% - 3rem);
            justify-content: center;
        }
        .portal-pill-btn {
            flex: 1;
            justify-content: center;
        }
        .main-title {
            font-size: 2.25rem;
        }
    }
</style>
{% endblock %}
