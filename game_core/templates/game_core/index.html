{% extends 'base.html' %}

{% block title %}Welcome to Smart Learning Platform - EduPlay{% endblock %}

{% block content %}
<div class="smart-portal-wrapper fade-in">
    
    <!-- Top Left Login Actions -->
    <div class="top-left-actions">
        <a href="{% url 'student_login' %}" class="portal-pill-btn student-pill">
            <span class="dot student-dot"></span> Student Login
        </a>
        <a href="{% url 'teacher_login' %}" class="portal-pill-btn teacher-pill">
            <span class="dot teacher-dot"></span> Teacher Login
        </a>
    </div>

    <!-- Main Centered Content Container -->
    <div class="portal-main-card">
        
        <!-- Elegant Education/Gaming Vector Illustration -->
        <div class="illustration-wrapper">
            <svg class="floating-icon" xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 24 24" fill="none" stroke="url(#pastel-grad)" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="pastel-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#3b82f6" />
                        <stop offset="50%" stop-color="#8b5cf6" />
                        <stop offset="100%" stop-color="#10b981" />
                    </linearGradient>
                </defs>
                <!-- Outer Ring -->
                <circle cx="12" cy="12" r="10" stroke-dasharray="4 4" stroke="rgba(139, 92, 246, 0.2)"/>
                <!-- Gamepad D-pad & Buttons integrated on Graduation cap -->
                <path d="M22 10v6M2 10l10-5 10 5-10 5-10-5z" />
                <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5" />
                <!-- Controller elements inside Cap -->
                <circle cx="12" cy="10" r="1.5" fill="url(#pastel-grad)" />
                <line x1="9.5" y1="10" x2="14.5" y2="10" stroke="url(#pastel-grad)" stroke-width="1" />
            </svg>
        </div>

        <!-- Heading & Subtitle -->
        <h1 class="main-title">Welcome to Smart Learning Platform</h1>
        <p class="main-subtitle">Learn, Compete, and Track Your Progress</p>
        
        <!-- Subtle Interactive Indicator -->
        <div class="indicator-bar">
            <span>Choose a portal at the top-left to begin</span>
        </div>
    </div>
</div>

<!-- Custom Page Overrides and Styling -->
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap');

    /* Global Page Overrides */
    body {
        background: linear-gradient(135deg, #f3f6ff 0%, #faf4ff 50%, #f0fdf4 100%) !important;
        color: #1f2937 !important;
        font-family: 'Poppins', 'Inter', sans-serif !important;
        min-height: 100vh;
        margin: 0;
        display: flex;
        flex-direction: column;
    }

    /* Hide standard dark navbar on index to showcase custom layout */
    #main-navbar {
        display: none !important;
    }

    /* Footer adjustments for light mode */
    footer {
        background: transparent !important;
        border-top: 1px solid rgba(0, 0, 0, 0.05) !important;
        color: #6b7280 !important;
        margin-top: auto;
    }

    /* Main Container */
    .smart-portal-wrapper {
        position: relative;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6rem 2rem 2rem 2rem;
    }

    /* Top Left Login Actions */
    .top-left-actions {
        position: absolute;
        top: 2.5rem;
        left: 2.5rem;
        display: flex;
        gap: 1rem;
        z-index: 100;
    }

    .portal-pill-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.65rem 1.35rem;
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 100px;
        color: #374151;
        font-size: 0.88rem;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .portal-pill-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.06), 0 0 0 3px rgba(139, 92, 246, 0.08);
        border-color: rgba(139, 92, 246, 0.2);
        color: #111827;
    }

    /* Status Indicator Dots */
    .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }
    
    .student-dot {
        background: #10b981;
        box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
    }
    
    .teacher-dot {
        background: #3b82f6;
        box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
    }

    /* Centered Content Card */
    .portal-main-card {
        max-width: 650px;
        padding: 3rem 2rem;
        text-align: center;
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 24px;
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.03);
    }

    /* Floating Illustration wrapper */
    .illustration-wrapper {
        margin-bottom: 2.25rem;
        display: flex;
        justify-content: center;
    }

    .floating-icon {
        animation: float 6s infinite ease-in-out;
    }

    /* Headings */
    .main-title {
        font-size: 2.75rem;
        font-weight: 800;
        color: #111827;
        margin: 0 0 1rem 0;
        letter-spacing: -0.03em;
        line-height: 1.2;
    }

    .main-subtitle {
        font-size: 1.15rem;
        color: #4b5563;
        margin: 0 0 2.5rem 0;
        font-weight: 400;
        line-height: 1.5;
    }

    /* Indicator Bar */
    .indicator-bar {
        display: inline-block;
        padding: 0.5rem 1.25rem;
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(0, 0, 0, 0.04);
        border-radius: 100px;
        font-size: 0.8rem;
        color: #6b7280;
        font-weight: 500;
    }

    /* Floating Animation keyframes */
    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    /* Responsive Adjustments */
    @media (max-width: 640px) {
        .smart-portal-wrapper {
            padding: 8rem 1.5rem 2rem 1.5rem;
            align-items: flex-start;
        }
        .top-left-actions {
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 3rem);
            justify-content: center;
        }
        .portal-pill-btn {
            flex: 1;
            justify-content: center;
        }
        .main-title {
            font-size: 2.25rem;
        }
    }
</style>
{% endblock %}
