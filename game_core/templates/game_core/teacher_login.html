{% extends 'base.html' %}

{% block title %}Teacher Login - EduPlay{% endblock %}

{% block content %}
<div class="glass-panel form-container slide-up" id="teacher-login-panel">
    <h2 class="form-title" style="color: var(--accent-cyan);">Teacher Sign In</h2>
    
    <form method="POST" id="teacher-login-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" class="form-control" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 1.5rem;" id="submit-teacher-login">
            Login to Dashboard
        </button>
    </form>
    
    <div class="form-footer" style="color: var(--text-secondary); font-size: 0.85rem; line-height: 1.6; border-top: 1px solid var(--border-color); padding-top: 1rem; margin-top: 1.5rem;">
        Teacher Access Only.
    </div>
</div>
{% endblock %}
